# Apply once by hand (kubectl apply -f) after installing Argo CD;
# from then on Argo CD keeps the cluster in sync with this repo.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frameworks
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/lkroon/charts.git
    targetRevision: main
    path: frameworks
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: frameworks
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
