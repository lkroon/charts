apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyramid
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pyramid
  template:
    metadata:
      labels:
        app: pyramid
    spec:
      containers:
        - name: pyramid
          image: {{ .Values.imageRegistry }}/frameworks-pyramid:{{ .Values.imageTag }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6543
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 6543
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 6543
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pyramid
spec:
  selector:
    app: pyramid
  ports:
    - name: http
      port: 80
      targetPort: 6543
