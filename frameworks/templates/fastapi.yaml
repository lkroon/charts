apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
spec:
  # replicas intentionally omitted: the HPA owns the count, and the app's
  # dashboard slider patches the scale subresource
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      serviceAccountName: fastapi
      containers:
        - name: fastapi
          image: {{ .Values.imageRegistry }}/frameworks-fastapi:{{ .Values.imageTag }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
            - name: GOOGLE_AUTH_ORIGIN
              value: {{ .Values.googleAuthOrigin }}
            - name: APP_VERSION
              value: {{ .Values.imageTag }}
            # Downward API: pod identity for the dashboard
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          envFrom:
            # Created out-of-band from .env (dev) or sealed-secrets (prod);
            # deliberately not managed by this chart
            - secretRef:
                name: fastapi-auth
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi
spec:
  selector:
    app: fastapitest
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fastapi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fastapi
  minReplicas: {{ .Values.hpa.minReplicas }}
  maxReplicas: {{ .Values.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.cpuUtilization }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fastapi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fastapi-scaler
rules:
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    resourceNames: ["fastapi"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fastapi-scaler
subjects:
  - kind: ServiceAccount
    name: fastapi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fastapi-scaler
